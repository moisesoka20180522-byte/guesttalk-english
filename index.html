<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f7a4d">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Everyday English Speak</title>
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.webmanifest?v=5">
    <link rel="stylesheet" href="styles.css?v=5">
  </head>
  <body>
    <main class="app-shell">
      <header class="speak-hero">
        <div>
          <p class="eyebrow">Everyday English Speak</p>
          <h1>AIと話して英会話</h1>
          <p>韓国語・日本語・英語で話すと、英語に直して、自然な返事と発音のコツを返します。</p>
        </div>
        <div class="hero-badge" aria-label="Practice count">
          <span>Today</span>
          <strong id="practiceCount">0</strong>
        </div>
      </header>

      <section class="control-panel" aria-label="会話設定">
        <label>
          <span>練習モード</span>
          <select id="conversationMode">
            <option value="voice">マイクで会話</option>
            <option value="text">テキスト会話</option>
          </select>
        </label>
        <label>
          <span>話す言語</span>
          <select id="inputLanguage">
            <option value="auto">Auto</option>
            <option value="ko">한국어</option>
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
        </label>
        <label>
          <span>レベル</span>
          <select id="levelSelect">
            <option value="beginner">初級</option>
            <option value="intermediate">中級</option>
            <option value="advanced">上級</option>
          </select>
        </label>
        <label>
          <span>トピック</span>
          <select id="topicSelect">
            <option value="daily">日常会話</option>
            <option value="self_intro">自己紹介</option>
            <option value="travel">旅行</option>
            <option value="food">食事・カフェ</option>
            <option value="shopping">買い物</option>
            <option value="work">仕事</option>
            <option value="friends">友達との会話</option>
            <option value="free">自由テーマ</option>
          </select>
        </label>
      </section>

      <section class="speak-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">AI Conversation</p>
            <h2>Speak Partner</h2>
          </div>
          <button id="resetChat" class="secondary-button" type="button">リセット</button>
        </div>

        <button id="voiceButton" class="mic-button" type="button">
          <span class="mic-icon">🎙</span>
          <strong>押して話す</strong>
          <small>マイク許可が必要です</small>
        </button>

        <div id="aiMessages" class="ai-messages" aria-live="polite"></div>

        <form id="aiForm" class="ai-form">
          <textarea id="aiInput" rows="3" placeholder="話した内容、または英文を書いてください。例: 오늘 친구랑 카페에 갔어 / I went to a cafe."></textarea>
          <button class="primary-button" type="submit">AIに送る</button>
        </form>
      </section>

      <section class="mission-strip" aria-label="練習ステップ">
        <article><span>1</span><p>韓国語・日本語・英語で話す</p></article>
        <article><span>2</span><p>自然な英語に直してもらう</p></article>
        <article><span>3</span><p>AIの質問に続けて答える</p></article>
      </section>

      <section class="phrase-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Quick Starter</p>
            <h2>会話を始める一言</h2>
          </div>
          <button id="newPrompt" class="icon-button" type="button" aria-label="新しい質問">+</button>
        </div>
        <p id="talkPrompt" class="prompt-line"></p>
        <p id="answerStarter" class="starter-line"></p>
      </section>
    </main>
    <script src="app.js?v=5"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js?v=5"));
      }
    </script>
  </body>
</html>
