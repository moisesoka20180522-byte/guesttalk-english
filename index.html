<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f7a4d">
    <meta name="mobile-web-app-capable" content="yes">
    <title>GuestTalk English AI</title>
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GuestTalk AI</p>
          <h1>AIゲストと場面別に英会話</h1>
        </div>
        <section class="today-card" aria-label="今日の練習記録">
          <span class="today-label">今日の会話</span>
          <strong id="practiceCount">0</strong>
          <span>回</span>
        </section>
      </header>

      <section class="ai-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">AI Roleplay</p>
            <h2>宿泊ゲスト役のAIと会話</h2>
          </div>
          <select id="aiScenario" aria-label="AI英会話の場面">
            <option value="checkin">チェックイン</option>
            <option value="room">客室案内</option>
            <option value="local">周辺案内</option>
            <option value="issues">トラブル対応</option>
            <option value="checkout">チェックアウト</option>
            <option value="smalltalk">雑談</option>
          </select>
        </div>

        <div id="aiMessages" class="ai-messages" aria-live="polite"></div>

        <form id="aiForm" class="ai-form">
          <textarea id="aiInput" rows="3" placeholder="英語で返事を書いてください。例: Welcome! May I check your reservation name?"></textarea>
          <button class="primary-button" type="submit">AIゲストに話す</button>
        </form>
      </section>

      <section class="mission-strip" aria-label="今日の練習ミッション">
        <article>
          <span>1</span>
          <p>AIゲストの質問に英語で答える</p>
        </article>
        <article>
          <span>2</span>
          <p>添削された英文を声に出す</p>
        </article>
        <article>
          <span>3</span>
          <p>次の質問まで会話を続ける</p>
        </article>
      </section>

      <section class="phrase-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Quick Phrases</p>
            <h2>民泊でそのまま使える英語</h2>
          </div>
          <button id="newPrompt" class="icon-button" type="button" aria-label="新しい表現">+</button>
        </div>
        <p id="talkPrompt" class="prompt-line"></p>
        <p id="answerStarter" class="starter-line"></p>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </body>
</html>
