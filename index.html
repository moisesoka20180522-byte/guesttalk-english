<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f7a4d">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Everyday English AI</title>
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.webmanifest?v=2">
    <link rel="stylesheet" href="styles.css?v=2">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Everyday English AI</p>
          <h1>AIと日常英会話</h1>
        </div>
        <section class="today-card" aria-label="今日の練習記録">
          <span class="today-label">今日の会話</span>
          <strong id="practiceCount">0</strong>
          <span>回</span>
        </section>
      </header>

      <section class="control-panel" aria-label="会話設定">
        <label><span>会話スタイル</span><select id="conversationMode"><option value="text">テキスト会話</option><option value="voice">話す練習</option></select></label>
        <label><span>レベル</span><select id="levelSelect"><option value="beginner">初級</option><option value="intermediate">中級</option><option value="advanced">上級</option></select></label>
        <label><span>トピック</span><select id="topicSelect"><option value="daily">日常会話</option><option value="self_intro">自己紹介</option><option value="travel">旅行</option><option value="food">食事・カフェ</option><option value="shopping">買い物</option><option value="work">仕事</option><option value="friends">友達との会話</option><option value="free">フリートーク</option></select></label>
      </section>

      <section class="ai-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">AI Conversation</p>
            <h2>AI会話パートナー</h2>
          </div>
          <button id="resetChat" class="secondary-button" type="button">リセット</button>
        </div>

        <div id="aiMessages" class="ai-messages" aria-live="polite"></div>

        <form id="aiForm" class="ai-form">
          <textarea id="aiInput" rows="3" placeholder="英語で返事を書いてください。例: I usually drink coffee in the morning."></textarea>
          <div class="button-row">
            <button id="voiceButton" class="secondary-button voice-only" type="button">マイクで話す</button>
            <button class="primary-button" type="submit">AIに送る</button>
          </div>
        </form>
      </section>

      <section class="mission-strip" aria-label="今日の練習ミッション">
        <article><span>1</span><p>AIの質問に英語で答える</p></article>
        <article><span>2</span><p>添削された英文を声に出す</p></article>
        <article><span>3</span><p>次の質問まで会話を続ける</p></article>
      </section>

      <section class="phrase-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Quick Starter</p>
            <h2>会話を始める一言</h2>
          </div>
          <button id="newPrompt" class="icon-button" type="button" aria-label="新しい表現">+</button>
        </div>
        <p id="talkPrompt" class="prompt-line"></p>
        <p id="answerStarter" class="starter-line"></p>
      </section>
    </main>
    <script src="app.js?v=2"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js?v=2"));
      }
    </script>
  </body>
</html>
